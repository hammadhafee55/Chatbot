<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H.A.A.S</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; font-family: 'Outfit', sans-serif; }
* { box-sizing: border-box; }

body {
  background: #0a0a14;
  overflow: hidden;
}

.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(99,72,255,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(56,132,255,0.1) 0%, transparent 60%),
              #0a0a14;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(130,120,255,0.25);
  animation: float linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-110%) scale(0.5); opacity: 0; }
}

.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.07);
}

.logo-glow {
  text-shadow: 0 0 40px rgba(120,100,255,0.35), 0 0 80px rgba(80,60,255,0.15);
}

.msg-fade { animation: msgIn 0.6s ease both; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(180,170,255,0.7);
  animation: blink 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.2; }
  40% { opacity: 1; }
}

.send-btn {
  transition: all 0.3s ease;
  background: linear-gradient(135deg, #6348ff, #3884ff);
}
.send-btn:hover {
  box-shadow: 0 0 20px rgba(99,72,255,0.4);
  transform: scale(1.05);
}

#chat-scroll::-webkit-scrollbar { width: 4px; }
#chat-scroll::-webkit-scrollbar-track { background: transparent; }
#chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.input-glass {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  transition: border-color 0.3s;
}
.input-glass:focus-within {
  border-color: rgba(99,72,255,0.4);
}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="bg-canvas" id="bg-canvas"></div>
  <div class="relative z-10 flex flex-col h-full w-full" id="app-wrapper"><!-- Header -->
   <header class="flex flex-col items-center pt-6 pb-3 shrink-0">
    <h1 id="brand" class="logo-glow text-3xl font-bold tracking-widest" style="color:#c4b8ff; font-family:'Outfit',sans-serif;">H.A.A.S</h1>
    <p id="tagline" class="text-xs mt-1 tracking-wider" style="color:rgba(180,170,255,0.5);">Intelligence Redefined</p>
   </header><!-- Chat Window -->
   <main class="flex-1 flex justify-center px-4 pb-2 overflow-hidden" style="min-height:0;">
    <div class="glass rounded-2xl flex flex-col w-full" style="max-width:640px;">
     <div id="chat-scroll" class="flex-1 overflow-y-auto px-5 py-4 space-y-3" style="min-height:0;"><!-- Messages injected here -->
     </div><!-- Input -->
     <form id="chat-form" class="shrink-0 px-4 pb-4 pt-2"><label for="user-input" class="sr-only">Type a message</label>
      <div class="input-glass rounded-xl flex items-center px-3 py-2 gap-2"><input id="user-input" type="text" placeholder="Ask about Big Data..." autocomplete="off" class="flex-1 bg-transparent outline-none text-sm" style="color:#e0daf7; font-family:'Outfit',sans-serif;"> <button type="submit" class="send-btn rounded-lg p-2 text-white shrink-0" aria-label="Send message"> <i data-lucide="send" style="width:16px;height:16px;"></i> </button>
      </div>
     </form>
    </div>
   </main><!-- Footer -->
   <footer class="shrink-0 text-center pb-4 pt-2">
    <p class="text-xs tracking-wide" style="color:rgba(180,170,255,0.3);">Developed by <span style="color:rgba(180,170,255,0.5);">Hammad Hafeez</span> · <span style="color:rgba(180,170,255,0.5);">Ali Raza</span> · <span style="color:rgba(180,170,255,0.5);">Shahzad</span> · <span style="color:rgba(180,170,255,0.5);">Aqeel</span></p>
   </footer>
  </div>
  <script>
// ── Particles ──
(function(){
  const bg = document.getElementById('bg-canvas');
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className='particle';
    const s = Math.random()*3+1.5;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*8}s;`;
    bg.appendChild(p);
  }
})();

// ── Knowledge Base ──
const KB = [
  { keys:['big data','what is big data'], answer:"Big Data is very large and complex data that normal software cannot handle easily. It comes from sources like social media, sensors, and transactions — growing at incredible speed and scale." },
  { keys:['types','types of big data','three types'], answer:"There are three types of Big Data:\n\n• <strong>Structured Data</strong> — organized in rows & columns\n• <strong>Unstructured Data</strong> — no proper format\n• <strong>Semi-Structured Data</strong> — partly organized" },
  { keys:['structured','structured data'], answer:"Structured Data is organized neatly in rows and columns, making it easy to store and analyze. Examples include Excel spreadsheets and relational databases." },
  { keys:['unstructured','unstructured data'], answer:"Unstructured Data has no proper format and is difficult to manage. Examples include videos, images, and social media posts." },
  { keys:['semi-structured','semi structured','semi-structured data'], answer:"Semi-Structured Data is partly organized — not fully structured but contains some formatting. Examples include JSON and XML files." },
];

function findAnswer(q) {
  const low = q.toLowerCase().replace(/[?!.,]/g,'').trim();
  for(const item of KB) {
    for(const k of item.keys) {
      if(low.includes(k)) return item.answer;
    }
  }
  return "I can help you learn about Big Data! Try asking about:\n• What is Big Data?\n• Types of Big Data\n• Structured, Unstructured, or Semi-Structured Data";
}

// ── Chat Logic ──
const chatScroll = document.getElementById('chat-scroll');
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');

function addBubble(html, isBot) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-fade flex ' + (isBot ? 'justify-start' : 'justify-end');
  const bubble = document.createElement('div');
  bubble.className = 'rounded-xl px-4 py-2.5 text-sm leading-relaxed';
  bubble.style.maxWidth = '82%';
  bubble.style.fontFamily = "'Outfit', sans-serif";
  if(isBot) {
    bubble.style.cssText += 'background:rgba(99,72,255,0.12);color:#d4ccff;border:1px solid rgba(99,72,255,0.15);';
  } else {
    bubble.style.cssText += 'background:linear-gradient(135deg,#6348ff,#3884ff);color:#fff;';
  }
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  chatScroll.appendChild(wrap);
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-fade flex justify-start';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="rounded-xl px-4 py-3" style="background:rgba(99,72,255,0.1);border:1px solid rgba(99,72,255,0.1);"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div>`;
  chatScroll.appendChild(wrap);
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

// Initial greeting
setTimeout(()=>{
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addBubble("Hello! I'm <strong>H.A.A.S</strong> — your Big Data assistant. Ask me anything about Big Data, its types, or examples! 🚀", true);
  }, 1200);
}, 400);

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = input.value.trim();
  if(!val) return;
  addBubble(val.replace(/</g,'&lt;'), false);
  input.value = '';
  showTyping();
  const delay = Math.random()*800 + 800;
  setTimeout(()=>{
    removeTyping();
    addBubble(findAnswer(val), true);
  }, delay);
});

// ── Element SDK ──
const defaultConfig = {
  brand_name: 'H.A.A.S',
  tagline: 'Intelligence Redefined',
  background_color: '#0a0a14',
  accent_color: '#6348ff',
  text_color: '#d4ccff',
  font_family: 'Outfit',
  font_size: 14,
};

function applyConfig(config) {
  const c = {...defaultConfig, ...config};
  document.getElementById('brand').textContent = c.brand_name;
  document.getElementById('tagline').textContent = c.tagline;
  const font = c.font_family + ", sans-serif";
  document.getElementById('brand').style.fontFamily = font;
  document.getElementById('tagline').style.fontFamily = font;
  input.style.fontFamily = font;
  document.querySelectorAll('#chat-scroll .rounded-xl').forEach(el => el.style.fontFamily = font);
  const base = c.font_size;
  document.getElementById('brand').style.fontSize = (base * 2.1) + 'px';
  document.getElementById('tagline').style.fontSize = (base * 0.8) + 'px';
  input.style.fontSize = base + 'px';
  document.body.style.background = c.background_color;
  document.getElementById('brand').style.color = c.text_color;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v});} },
      { get:()=>config.accent_color||defaultConfig.accent_color, set:(v)=>{config.accent_color=v;window.elementSdk.setConfig({accent_color:v});} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v});} },
    ],
    borderables: [],
    fontEditable: { get:()=>config.font_family||defaultConfig.font_family, set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v});} },
    fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v});} },
  }),
  mapToEditPanelValues: (config) => new Map([
    ['brand_name', config.brand_name || defaultConfig.brand_name],
    ['tagline', config.tagline || defaultConfig.tagline],
  ]),
});

lucide.createIcons();
</script>
