<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H.A.A.S</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; font-family: 'Outfit', sans-serif; }

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: float linear infinite;
  opacity: 0.15;
}

@keyframes float {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-100%) translateX(30px); opacity: 0; }
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-bubble { animation: fadeSlideUp 0.35s ease-out both; }

@keyframes typing {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

.typing-dot { animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes glow-pulse {
  0%, 100% { text-shadow: 0 0 20px rgba(139,92,246,0.5), 0 0 40px rgba(59,130,246,0.3); }
  50% { text-shadow: 0 0 30px rgba(139,92,246,0.8), 0 0 60px rgba(59,130,246,0.5); }
}

.title-glow { animation: glow-pulse 3s ease-in-out infinite; }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}

.send-btn:hover { box-shadow: 0 0 20px rgba(139,92,246,0.5); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 4px; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-hidden" style="background: #0a0a1a;">
  <div id="particles" class="fixed inset-0 overflow-hidden pointer-events-none"></div>
  <div class="h-full w-full flex flex-col items-center relative z-10" style="background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 60%);">
   <header class="pt-8 pb-4 text-center flex-shrink-0">
    <h1 id="site-title" class="text-4xl font-bold title-glow bg-gradient-to-r from-blue-400 via-purple-400 to-violet-400 bg-clip-text text-transparent tracking-wider">H.A.A.S</h1>
    <p class="text-xs text-white/30 mt-1 tracking-widest uppercase">Intelligent Assistant</p>
   </header>
   <main class="flex-1 w-full max-w-2xl px-4 pb-4 flex flex-col overflow-hidden" style="min-height: 0;">
    <div class="glass rounded-2xl flex-1 flex flex-col overflow-hidden">
     <div id="chat-area" class="flex-1 overflow-y-auto p-5 space-y-3" style="min-height: 0;">
      <div class="chat-bubble flex justify-start">
       <div class="max-w-[80%] px-4 py-3 rounded-2xl rounded-bl-sm text-sm leading-relaxed" style="background: rgba(139,92,246,0.15); color: rgba(255,255,255,0.85);">
        Hello! I'm <strong>H.A.A.S</strong>. Ask me about Big Data, data types, or our team! 🚀
       </div>
      </div>
     </div>
     <div class="p-4 border-t border-white/5 flex-shrink-0">
      <form id="chat-form" class="flex gap-3 items-center">
       <input id="chat-input" type="text" placeholder="Ask something…" autocomplete="off" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/25 outline-none focus:border-purple-500/40 transition-colors"> <button type="submit" class="send-btn w-11 h-11 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white transition-all duration-200 flex-shrink-0" aria-label="Send">
        <svg width="18" height="18" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg></button>
      </form>
     </div>
    </div>
   </main>
   <footer class="py-3 flex-shrink-0">
    <p id="footer-text" class="text-[11px] text-white/20 tracking-wide text-center">Hammad Hafeez | Ali Raza | Shahzad | Aqeel</p>
   </footer>
  </div>
  <script>
// Config
const defaultConfig = {
  site_title: 'H.A.A.S',
  input_placeholder: 'Ask something…',
  footer_text: 'Hammad Hafeez | Ali Raza | Shahzad | Aqeel',
  background_color: '#0a0a1a',
  surface_color: '#8b5cf6',
  text_color: '#d4d4e0',
  primary_action_color: '#7c3aed',
  secondary_action_color: '#3b82f6'
};

function applyConfig(c) {
  const titleEl = document.getElementById('site-title');
  const inputEl = document.getElementById('chat-input');
  const footerEl = document.getElementById('footer-text');
  
  if (titleEl) titleEl.textContent = c.site_title || defaultConfig.site_title;
  if (inputEl) inputEl.placeholder = c.input_placeholder || defaultConfig.input_placeholder;
  if (footerEl) footerEl.textContent = c.footer_text || defaultConfig.footer_text;
  
  document.body.style.background = c.background_color || defaultConfig.background_color;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (c) => applyConfig(c),
    mapToCapabilities: (c) => ({
      recolorables: [
        { get: () => c.background_color || defaultConfig.background_color, set: v => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
        { get: () => c.surface_color || defaultConfig.surface_color, set: v => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
        { get: () => c.text_color || defaultConfig.text_color, set: v => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
        { get: () => c.primary_action_color || defaultConfig.primary_action_color, set: v => { c.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); }},
        { get: () => c.secondary_action_color || defaultConfig.secondary_action_color, set: v => { c.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); }}
      ],
      borderables: [],
      fontEditable: { get: () => c.font_family || 'Outfit', set: v => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }},
      fontSizeable: undefined
    }),
    mapToEditPanelValues: (c) => new Map([
      ['site_title', c.site_title || defaultConfig.site_title],
      ['input_placeholder', c.input_placeholder || defaultConfig.input_placeholder],
      ['footer_text', c.footer_text || defaultConfig.footer_text]
    ])
  });
}

// Particles
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 2;
  p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${Math.random()>0.5?'#8b5cf6':'#3b82f6'};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*5}s;`;
  particleContainer.appendChild(p);
}

// QA
const qa = [
  { q: ['what is big data','big data'], a: 'Big data is very large and complex data that normal software cannot handle easily. It involves massive volumes of structured and unstructured information.' },
  { q: ['types of big data','types'], a: 'There are three types of big data:\n\n📊 <strong>Structured Data</strong> — organized in rows & columns\n📁 <strong>Unstructured Data</strong> — no proper format\n📋 <strong>Semi-Structured Data</strong> — partially organized' },
  { q: ['explain all types','all types of data'], a: '📊 <strong>Structured Data</strong> is organized in rows and columns, easy to analyze. Example: Excel, databases.\n\n📁 <strong>Unstructured Data</strong> has no proper format and is difficult to manage. Example: videos, images, social media.\n\n📋 <strong>Semi-Structured Data</strong> is partially organized with some structure. Example: JSON, XML.' },
  { q: ['structured data'], a: 'Structured data is organized in rows and columns — easy to store and analyze. Think spreadsheets and SQL databases.' },
  { q: ['unstructured data'], a: 'Unstructured data has no proper format and is difficult to manage. Examples include videos, images, and social media posts.' },
  { q: ['semi-structured','semi structured'], a: 'Semi-structured data is partly organized but not fully structured. Common examples are JSON and XML files.' },
  { q: ['developer','developers','who made','who created'], a: 'The team behind H.A.A.S:\n\n👨‍💻 Hammad Hafeez\n👨‍💻 Ali Raza\n👨‍💻 Shahzad\n👨‍💻 Aqeel' },
  { q: ['roll number','roll numbers','roll no'], a: '🎓 Roll Numbers:\n\nHammad — 5032\nShahzad — 5019\nAqeel — 5030\nAli Raza — 5015' },
  { q: ['hello','hi','hey','hola'], a: 'Hey there! 👋 How can I help you today? Ask me about Big Data or our team!' },
  { q: ['thank','thanks'], a: 'You\'re welcome! 😊 Feel free to ask anything else.' }
];

function getReply(input) {
  const lower = input.toLowerCase().trim();
  for (const item of qa) {
    if (item.q.some(k => lower.includes(k))) return item.a;
  }
  return "I'm not sure about that yet. Try asking about Big Data, data types, developers, or roll numbers! 🤔";
}

function addBubble(html, isUser) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'chat-bubble flex ' + (isUser ? 'justify-end' : 'justify-start');
  const bubble = document.createElement('div');
  bubble.className = 'max-w-[80%] px-4 py-3 rounded-2xl text-sm leading-relaxed whitespace-pre-line';
  if (isUser) {
    bubble.classList.add('rounded-br-sm');
    bubble.style.cssText = 'background:rgba(59,130,246,0.2);color:rgba(255,255,255,0.9);';
  } else {
    bubble.classList.add('rounded-bl-sm');
    bubble.style.cssText = 'background:rgba(139,92,246,0.15);color:rgba(255,255,255,0.85);';
  }
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return wrap;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.id = 'typing-indicator';
  wrap.className = 'chat-bubble flex justify-start';
  wrap.innerHTML = `<div class="px-4 py-3 rounded-2xl rounded-bl-sm flex gap-1.5 items-center" style="background:rgba(139,92,246,0.15);">
    <span class="typing-dot w-2 h-2 rounded-full bg-purple-400"></span>
    <span class="typing-dot w-2 h-2 rounded-full bg-purple-400"></span>
    <span class="typing-dot w-2 h-2 rounded-full bg-purple-400"></span>
  </div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

document.getElementById('chat-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addBubble(text, true);
  showTyping();
  const reply = getReply(text);
  setTimeout(() => {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
    addBubble(reply, false);
  }, 800 + Math.random() * 600);
});
</script>
